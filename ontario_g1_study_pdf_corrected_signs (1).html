const letters=['A','B','C','D'];
const store={get(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};
let state={screen:'home',cat:'all',mode:'quiz',questions:[],idx:0,answers:[],revealed:{},score:0};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function qAnswer(item){return item.part==='A'?item.q[6]-1:item.q[2]-1}function qQuestion(item){return item.part==='A'?item.q[4]:item.q[0]}function qOptions(item){return item.part==='A'?item.q[5]:item.q[1]}function qId(item){return item.part+':'+item.idx}function allWrong(){return store.get('g1_wrong',[])}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function baseList(cat){let l=[];if(cat==='all'||cat==='A')PA.forEach((q,i)=>l.push({part:'A',idx:i,q}));if(cat==='all'||cat==='B')PB.forEach((q,i)=>l.push({part:'B',idx:i,q}));return l}
function buildList(mode){if(mode==='mock'){return shuffle([...shuffle(PA.map((q,i)=>({part:'A',idx:i,q}))).slice(0,20),...shuffle(PB.map((q,i)=>({part:'B',idx:i,q}))).slice(0,20)])}let l=baseList(state.cat);if(mode==='wrong'){const wr=allWrong();l=l.filter(x=>wr.some(w=>w.part===x.part&&w.idx===x.idx));if(!l.length){toast('No wrong answers yet');return null}}return mode==='study'?l:shuffle(l)}
function render(){state.screen==='home'?home():state.screen==='results'?results():quiz()}
function home(){const wr=allWrong().length;document.getElementById('app').innerHTML=`<div class="topbar"><div class="topline"><div class="title">🍁 Ontario G1 Study</div><div class="scorepill">All ${PA.length+PB.length} Q&A</div></div></div><main class="page"><section class="hero"><div style="font-size:42px">🍁</div><h1>Ontario G1 Knowledge Test</h1><p>Mobile optimized interactive practice. Includes Part A Traffic Signs (${PA.length}) and Part B Rules of the Road (${PB.length}).</p></section><div class="stats"><div class="stat"><b>${PA.length}</b><span>Signs</span></div><div class="stat"><b>${PB.length}</b><span>Rules</span></div><div class="stat"><b>${wr}</b><span>Review</span></div></div><div class="label">Choose category</div><div class="seg"><button class="${state.cat==='all'?'active':''}" onclick="setCat('all')">📚 All</button><button class="${state.cat==='A'?'active':''}" onclick="setCat('A')">🚦 Signs</button><button class="${state.cat==='B'?'active':''}" onclick="setCat('B')">📋 Rules</button></div><div class="label">Choose mode</div><div class="modes"><button class="mode primary" onclick="start('study')"><div class="ico">📖</div>Study<small>Reveal answers and move back/next</small></button><button class="mode red" onclick="start('quiz')"><div class="ico">✏️</div>Quiz<small>Instant feedback and score</small></button><button class="mode blue" onclick="start('mock')"><div class="ico">🎯</div>Mock Test<small>20 signs + 20 rules</small></button><button class="mode amber" onclick="start('wrong')"><div class="ico">⚠️</div>Wrong<small>${wr} saved questions</small></button></div><p class="tip"><b>Tip:</b> Use Mock Test for exam-style practice. Your wrong answers are saved for review.</p></main>`}
function setCat(c){state.cat=c;render()}function start(m){const qs=buildList(m);if(!qs)return;state={...state,screen:'quiz',mode:m,questions:qs,idx:0,answers:Array(qs.length).fill(null),revealed:{},score:0};render();scrollTo(0,0)}
function signHtml(item){if(item.part!=='A')return'';const desc=item.q[3];const img=SIGN_IMAGES[item.idx];return`<div class="signbox pdf"><img class="signimg" src="${img}" alt="Traffic sign for question ${item.idx+1}"><div class="desc">${desc}</div></div>`}
function quiz(){const item=state.questions[state.idx],total=state.questions.length,ans=qAnswer(item),chosen=state.answers[state.idx],rev=!!state.revealed[state.idx],opts=qOptions(item),isAnswered=chosen!==null&&chosen!==undefined,pct=Math.round(((state.idx+1)/total)*100);const pageJumpHtml=state.mode==='study'?`<div class="pagejump"><button onclick="jumpBy(-10)" ${state.idx<10?'disabled':''}>« 10</button><button onclick="gotoQuestion(1)" ${state.idx===0?'disabled':''}>First</button><input type="number" inputmode="numeric" id="pageInput" value="${state.idx+1}" min="1" max="${total}" onkeydown="if(event.key==='Enter'){gotoQuestion(this.value);this.blur()}"><span>of ${total}</span><button class="go" onclick="gotoQuestion(document.getElementById('pageInput').value)">Go</button><button onclick="gotoQuestion(${total})" ${state.idx===total-1?'disabled':''}>Last</button><button onclick="jumpBy(10)" ${state.idx>total-11?'disabled':''}>10 »</button></div>`:'';let optHtml=opts.map((o,i)=>{let cls='opt';if(isAnswered||rev){if(i===ans)cls+=' correct';else if(i===chosen)cls+=' wrong'}return`<button class="${cls}" onclick="choose(${i})" ${(isAnswered||rev)?'disabled':''}><span class="letter">${letters[i]}</span><span>${o}</span></button>`}).join('');let fb='';if(isAnswered&&state.mode!=='study')fb=chosen===ans?`<div class="feedback good">✅ Correct!</div>`:`<div class="feedback bad">❌ Wrong. Correct answer: ${letters[ans]}. ${opts[ans]}</div>`;let reveal=state.mode==='study'?`<div class="answerbox ${rev?'show':''}"><b>Answer ${letters[ans]}:</b> ${opts[ans]}</div>${!rev?'<button class="opt" style="justify-content:center;margin-top:12px;background:#005826;color:white;border-color:#005826;font-weight:900" onclick="showAnswer()">Show Answer</button>':''}`:'';document.getElementById('app').innerHTML=`<div class="topbar"><div class="topline"><button class="back" onclick="goHome()">‹</button><div class="title">${state.mode==='mock'?'Mock Test':state.mode==='study'?'Study Mode':state.mode==='wrong'?'Review Wrong':'Quiz Mode'}</div><div class="scorepill">${state.idx+1}/${total}</div></div><div class="progress"><div class="bar" style="width:${pct}%"></div></div></div><main class="page"><div class="qmeta"><span>Question ${state.idx+1} of ${total}</span><span class="badge">Part ${item.part}: ${item.part==='A'?'Signs':'Rules'}</span></div>${pageJumpHtml}<section class="card">${signHtml(item)}<div class="qbody"><div class="qnum">${item.part==='A'?'A'+item.q[0]:'B'+(item.idx+1)}</div><div class="qtext">${qQuestion(item)}</div><div class="opts">${optHtml}</div>${reveal}</div></section>${fb}</main><div class="bottomnav"><button class="prev" onclick="prevQ()" ${state.idx===0?'disabled':''}>← Previous</button><button class="next ${state.mode==='study'?'green':''}" onclick="nextQ()" ${(!canMoveNext())?'disabled':''}>${state.idx===total-1?'Finish':'Next →'}</button></div>`}
function canMoveNext(){if(state.mode==='study')return true;return state.answers[state.idx]!==null&&state.answers[state.idx]!==undefined}
function choose(i){if(state.mode==='study')return; if(state.answers[state.idx]!==null&&state.answers[state.idx]!==undefined)return;state.answers[state.idx]=i;render()}function showAnswer(){state.revealed[state.idx]=true;render()}function prevQ(){if(state.idx>0){state.idx--;render();scrollTo(0,0)}}function nextQ(){if(!canMoveNext())return;if(state.idx<state.questions.length-1){state.idx++;render();scrollTo(0,0);return}finish()}
function gotoQuestion(n){n=parseInt(n,10);if(isNaN(n))return;const total=state.questions.length;n=Math.max(1,Math.min(total,n));state.idx=n-1;render();scrollTo(0,0)}
function jumpBy(delta){gotoQuestion(state.idx+1+delta)}
function finish(){if(state.mode==='study'){goHome();return}let correct=0,wrong=[];state.questions.forEach((it,i)=>{const ok=state.answers[i]===qAnswer(it);if(ok)correct++;else wrong.push({part:it.part,idx:it.idx})});state.score=correct;let saved=allWrong();wrong.forEach(w=>{if(!saved.some(x=>x.part===w.part&&x.idx===w.idx))saved.push(w)});state.questions.forEach((it,i)=>{if(state.answers[i]===qAnswer(it)){const k=saved.findIndex(x=>x.part===it.part&&x.idx===it.idx);if(k>=0)saved.splice(k,1)}});store.set('g1_wrong',saved);state.screen='results';render();scrollTo(0,0)}
function results(){const total=state.questions.length,pct=Math.round(state.score/total*100),wrong=state.questions.map((it,i)=>({it,i,chosen:state.answers[i],ans:qAnswer(it)})).filter(x=>x.chosen!==x.ans);const items=wrong.slice(0,25).map(x=>{const opts=qOptions(x.it);return`<div class="reviewitem"><b>${qQuestion(x.it)}</b><br><span style="color:#991b1b">Your: ${x.chosen==null?'Not answered':letters[x.chosen]+' — '+opts[x.chosen]}</span><br><span style="color:#166534">Correct: ${letters[x.ans]} — ${opts[x.ans]}</span></div>`}).join('');document.getElementById('app').innerHTML=`<div class="topbar"><div class="topline"><button class="back" onclick="goHome()">‹</button><div class="title">Your Results</div></div></div><main class="page results"><div class="hero"><div class="scorebig">${state.score}</div><h1>${pct}%</h1><p>out of ${total} questions</p><p>${pct>=80?'🎉 Great job. Keep practicing.':'📚 Keep studying. Aim for 80% or higher.'}</p></div><div class="stats"><div class="stat"><b style="color:#22c55e">${state.score}</b><span>Correct</span></div><div class="stat"><b>${total-state.score}</b><span>Wrong</span></div><div class="stat"><b>${pct}%</b><span>Score</span></div></div>${wrong.length?`<div class="label">Wrong answers (${Math.min(wrong.length,25)} shown)</div><div class="review">${items}</div>`:`<p class="tip">🎉 Perfect score!</p>`}<div class="actions"><button onclick="start(state.mode)">Try Again</button><button class="outline" onclick="start('wrong')">Review Wrong Answers</button><button style="background:#005826" onclick="goHome()">Back to Home</button></div></main>`}
function goHome(){state.screen='home';state.idx=0;render();scrollTo(0,0)}
console.log(`Loaded ${PA.length+PB.length} questions: ${PA.length} signs + ${PB.length} rules`);render();
</script></body></html>
